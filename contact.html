<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木鱼安全实验室 - 联系我们</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <meta property="og:title" content="木鱼安全实验室 - 联系我们">
    <meta property="og:description" content="联系木鱼安全实验室，与我们交流合作">
    <meta property="og:image" content="img/logo.jpg">
    <meta property="og:url" content="https://muyusec.github.io/contact.html">
</head>
<body data-page="contact">
    <div id="navbar-container"></div>

    <main>
        <section class="hero">
            <p class="hero-kicker" data-reveal>Contact</p>
            <h1 class="hero-title" data-reveal>联系<span>我们</span></h1>
            <p class="hero-subtitle" data-reveal>欢迎交流合作、技术问题讨论与团队联络。</p>
        </section>

        <section class="section section--tight">
            <div class="contact-layout">
                <article class="contact-card" data-reveal>
                    <h3>联系信息</h3>
                    <div class="contact-list">
                        <div class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <div>
                                <strong>电子邮箱</strong>
                                <a href="mailto:muy0sec@gmail.com">muy0sec@gmail.com</a>
                            </div>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <strong>地址</strong>
                                <span>湖南省湘潭市福星东路88号湖南工程学院</span>
                            </div>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-clock"></i>
                            <div>
                                <strong>工作时间</strong>
                                <span>周一至周五: 9:00 AM - 5:00 PM</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <strong style="display:block;margin-bottom:10px;">关注我们</strong>
                        <div class="social-row">
                            <a class="social-chip" href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                            <a class="social-chip" href="#" aria-label="WeChat"><i class="fab fa-weixin"></i></a>
                            <a class="social-chip" href="#" aria-label="QQ"><i class="fab fa-qq"></i></a>
                            <a class="social-chip" href="#" aria-label="Weibo"><i class="fab fa-weibo"></i></a>
                        </div>
                    </div>
                </article>

                <article class="contact-card" data-reveal>
                    <h3>发送消息</h3>
                    <form id="contactForm" class="form-grid">
                        <div>
                            <label for="name" class="form-label">姓名</label>
                            <input id="name" class="form-control" type="text" required>
                        </div>
                        <div>
                            <label for="email" class="form-label">电子邮箱</label>
                            <input id="email" class="form-control" type="email" required>
                        </div>
                        <div>
                            <label for="subject" class="form-label">主题</label>
                            <input id="subject" class="form-control" type="text" required>
                        </div>
                        <div>
                            <label for="message" class="form-label">消息内容</label>
                            <textarea id="message" class="form-control" required></textarea>
                        </div>
                        <button class="form-submit" type="submit">发送消息</button>
                        <p id="contact-feedback" class="form-feedback" aria-live="polite"></p>
                    </form>
                </article>
            </div>

            <div class="map-wrap" data-reveal>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3417.5562169993814!2d112.9196491!3d27.882663!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjfCsDUyJzU3LjYiTiAxMTLCsDU1JzEwLjciRQ!5e0!3m2!1sen!2sus!4v1651234567890!5m2!1sen!2sus" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <span>&copy; 2022-2025 木鱼安全实验室</span>
        <span>Contact MuYu Security Lab</span>
    </footer>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
