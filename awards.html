<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木鱼安全实验室 - 团队奖项</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <meta property="og:title" content="木鱼安全实验室 - 团队奖项">
    <meta property="og:description" content="木鱼安全实验室获得的漏洞报告证书和CTF竞赛奖项">
    <meta property="og:image" content="img/logo.jpg">
    <meta property="og:url" content="https://muyusec.github.io/awards.html">
</head>
<body data-page="awards">
    <div id="navbar-container"></div>

    <main>
        <section class="hero">
            <p class="hero-kicker" data-reveal>Awards</p>
            <h1 class="hero-title" data-reveal>团队<span>奖项</span></h1>
            <p class="hero-subtitle" data-reveal>记录我们的漏洞实践与CTF赛场成果。</p>
        </section>

        <section class="section section--tight">
            <div class="section-intro" data-reveal>
                <p class="eyebrow">Vulnerability Reports</p>
                <h2 class="section-title">漏洞报告</h2>
                <p class="section-desc">已公开展示的漏洞报送与相关证书记录。</p>
            </div>
            <div class="record-list" id="vuln-list" data-reveal></div>
        </section>

        <section class="section section--tight">
            <div class="section-intro" data-reveal>
                <p class="eyebrow">CTF & Competitions</p>
                <h2 class="section-title">CTF 与竞赛成果</h2>
                <p class="section-desc">覆盖校赛、省赛、全国性赛事与攻防演练结果。</p>
            </div>
            <div class="award-grid" id="ctf-grid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <span>&copy; 2022-2025 木鱼安全实验室</span>
        <span>Awards & Records</span>
    </footer>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script>
        function createVulnerabilityItem(report) {
            const description = report.link && report.link !== '#'
                ? `<a class="record-link" href="${report.link}" target="_blank" rel="noopener noreferrer">${report.description}</a>`
                : report.description;

            return `
                <article class="record-item" data-reveal>
                    <p class="record-date">${report.date}</p>
                    <p class="record-desc">${description}</p>
                </article>
            `;
        }

        function createCompetitionItem(item) {
            return `
                <article class="award-card" data-reveal>
                    <p class="award-date">${item.date}</p>
                    <h3 class="award-name">${item.name}</h3>
                    <p class="award-rank">${item.rank}</p>
                </article>
            `;
        }

        function renderAwards(data) {
            const vulnList = document.getElementById('vuln-list');
            const ctfGrid = document.getElementById('ctf-grid');

            if (vulnList) {
                vulnList.innerHTML = data.vulnerabilityReports.map(createVulnerabilityItem).join('');
            }

            if (ctfGrid) {
                ctfGrid.innerHTML = data.ctfCompetitions.map(createCompetitionItem).join('');
            }

            if (typeof initRevealAnimation === 'function') {
                initRevealAnimation();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('data/awards.json');
                if (!response.ok) {
                    throw new Error('奖项数据加载失败');
                }

                const data = await response.json();
                renderAwards(data);
            } catch (error) {
                const vulnList = document.getElementById('vuln-list');
                if (vulnList) {
                    vulnList.innerHTML = `<article class="record-item"><p class="record-date">Error</p><p class="record-desc">奖项数据暂时无法加载，请稍后重试。</p></article>`;
                }
                console.error(error);
            }
        });
    </script>
</body>
</html>
